<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Risk Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background: #f5f6fa; }
.card { border-radius: 15px; }
.progress { height: 25px; border-radius: 12px; }
.progress-bar { font-weight: bold; }
table { font-size: 0.9rem; }
</style>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h3 class="text-center mb-4"><i class="fas fa-chart-line"></i> Transaction Risk Dashboard</h3>

        <div class="mb-4">
            <canvas id="riskBarChart" style="max-width:600px;margin:0 auto;"></canvas>
        </div>

        <div class="mb-4">
            <label class="form-label">Risk Score: {{ risk_score }}%</label>
            <div class="progress">
                <div class="progress-bar" role="progressbar" style="width: {{ risk_score }}%; background-color: {{ color }};">
                    {{ risk_score }}%
                </div>
            </div>
        </div>

        <h5 class="text-center">Risk Level: <span class="badge" style="background-color: {{ color }};">{{ risk_level }}</span></h5>


        <div class="text-center mt-3">
            <a href="/" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
</div>

<script>
const ctx = document.getElementById('riskBarChart').getContext('2d');
const riskBarChart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Risk Score', 'Anomaly Score'],
        datasets: [{
            label: 'Score %',
            data: [{{ risk_score }}, 50],  
            backgroundColor: ['{{ color }}', '#6c757d'],
            borderRadius: 5
        }]
    },
    options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            x: { max: 100, ticks: { callback: function(val){ return val + "%"; } } },
            y: { beginAtZero: true }
        }
    }
});
</script>

</body>
</html>
